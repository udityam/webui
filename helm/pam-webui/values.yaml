# ─── pam-webui Helm values — production-hardened defaults ─────────────────────

replicaCount: 1

image:
  repository: docker.io/amitbbd/webui
  tag: "0.1.2"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ─── Service Account ──────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""
  # No K8s API access needed — disable token auto-mount
  automountServiceAccountToken: false

# ─── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80          # Service port (cluster-internal)
  targetPort: 8080  # nginx-unprivileged listens on 8080

# ─── Pod annotations / labels ─────────────────────────────────────────────────
podAnnotations: {}
podLabels: {}

# ─── Pod Security Context (pod-level) ────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101       # nginx-unprivileged UID
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

# ─── Container Security Context ───────────────────────────────────────────────
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ─── Resources ────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# ─── Probes ───────────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# ─── Autoscaling ──────────────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# ─── Pod Disruption Budget ────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ─── Extra emptyDir volumes for nginx temp paths (required for readOnlyRootFilesystem) ───
# nginx-unprivileged needs writable tmp dirs; mount as emptyDir
nginxTmpVolumes:
  enabled: true

# ─── Node placement ───────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

# ─── Topology spread (recommended for HA across zones) ───────────────────────
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: pam-webui
