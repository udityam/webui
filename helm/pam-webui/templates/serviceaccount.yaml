{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pam-webui.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pam-webui.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The web UI has no need to call the Kubernetes API.
# Disabling auto-mount eliminates the risk of token exfiltration.
automountServiceAccountToken: false
{{- end }}
