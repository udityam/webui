    # ─── nginx.conf — Global nginx configuration ─────────────────────────────────
    # Designed for non-root nginxinc/nginx-unprivileged or nginx:alpine running on port 8080.

    worker_processes  auto;
    worker_rlimit_nofile 65536;
    error_log  /var/log/nginx/error.log warn;
    pid        /tmp/nginx.pid;  # non-root writable location

    events {
        worker_connections 1024;
        multi_accept on;
        use epoll;
    }

    http {
        # ─── Temp paths writable by non-root ──────────────────────────────────────
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path       /tmp/proxy_temp;
        fastcgi_temp_path     /tmp/fastcgi_temp;
        uwsgi_temp_path       /tmp/uwsgi_temp;
        scgi_temp_path        /tmp/scgi_temp;

        # ─── MIME & Charset ───────────────────────────────────────────────────────
        include      /etc/nginx/mime.types;
        default_type application/octet-stream;
        charset      utf-8;

        # ─── Logging ──────────────────────────────────────────────────────────────
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';
        access_log /var/log/nginx/access.log main;

        # ─── Hide server version ──────────────────────────────────────────────────
        server_tokens off;

        # ─── Performance ──────────────────────────────────────────────────────────
        sendfile           on;
        tcp_nopush         on;
        tcp_nodelay        on;
        keepalive_timeout  65;
        keepalive_requests 1000;
        reset_timedout_connection on;

        # ─── Gzip Compression ─────────────────────────────────────────────────────
        gzip              on;
        gzip_vary         on;
        gzip_proxied      any;
        gzip_comp_level   6;
        gzip_min_length   1024;
        gzip_buffers      16 8k;
        gzip_http_version 1.1;
        gzip_types
            text/plain
            text/css
            text/javascript
            text/xml
            application/javascript
            application/json
            application/xml
            application/rss+xml
            application/atom+xml
            image/svg+xml
            font/truetype
            font/opentype
            application/vnd.ms-fontobject;

        # ─── Buffer sizes ─────────────────────────────────────────────────────────
        client_max_body_size    10m;
        client_body_buffer_size 128k;
        large_client_header_buffers 4 32k;

        # ─── Include virtual host config ──────────────────────────────────────────
        include /etc/nginx/conf.d/*.conf;
    }
