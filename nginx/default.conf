# ─── default.conf — Virtual host for Angular SPA ─────────────────────────────

server {
    listen      8080;
    listen      [::]:8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ─── Security Headers ─────────────────────────────────────────────────────
    # X-Frame-Options: prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # X-Content-Type-Options: prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS — Envoy Gateway does TLS, but add for defence-in-depth in responses
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content-Security-Policy — tighten per your CDN/font sources
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline';
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com data:;
        img-src     'self' data: blob:;
        connect-src 'self';
        frame-ancestors 'none';
        base-uri    'self';
        form-action 'self';
    " always;

    # Permissions-Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── Health Check ─────────────────────────────────────────────────────────
    # Kubernetes liveness and readiness probes target this endpoint.
    location = /health {
        access_log  off;
        return 200  "healthy\n";
        add_header  Content-Type text/plain;
    }

    # ─── Pre-compressed static assets (gzip) ─────────────────────────────────
    location ~* \.(js|css|wasm)$ {
        # Serve pre-compressed .gz files if client supports gzip
        gzip_static   on;

        expires       1y;
        add_header    Cache-Control "public, immutable";
        access_log    off;

        # Re-apply security headers (add_header is not inherited from parent in sub-locations)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ─── Static assets (images, fonts, icons) ────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|otf)$ {
        expires    30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ─── index.html — no cache (contains hashed asset references) ────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ─── SPA Fallback ─────────────────────────────────────────────────────────
    # All other requests (Angular routes like /dashboard, /login) are served
    # index.html so the Angular router handles them client-side.
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ─── Deny hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Error pages ──────────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
